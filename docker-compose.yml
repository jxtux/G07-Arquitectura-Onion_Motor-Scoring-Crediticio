services:
  motor-scoring-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: motor-scoring-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/motor_scoring;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: ""
      SERVER_PORT: "8080"
    volumes:
      - motor_scoring_h2_data:/app/data
    restart: unless-stopped

volumes:
  motor_scoring_h2_data:
